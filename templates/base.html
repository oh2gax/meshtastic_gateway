<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meshtastic Gateway</title>
  <script>
    // Apply saved theme BEFORE stylesheets to avoid a flash of the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('mg-theme');
        if (!t) {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-bs-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="container">
  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <h3 class="m-0 me-3">Meshtastic Gateway</h3>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('inbox') }}">Inbox</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('outbox_view') }}">Outbox</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('nodes') }}">Active Nodes</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('broadcast') }}">Broadcast</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('chat_index') }}">Chat</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('map_view') }}">Map</a>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('debug_view') }}">Debug</a>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('status_view') }}">Status</a>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('services_view') }}">Services</a>
    <a class="btn btn-primary btn-sm" href="{{ url_for('send_form') }}">Send</a>
    <button type="button" class="btn btn-outline-secondary btn-sm" id="themeToggle" title="Toggle dark/light theme">Theme</button>
    <a id="newMsgBadge"
       href="{{ url_for('inbox') }}"
       class="ms-auto text-decoration-none fw-bold"
       style="display:none; color:#dc3545;"
       title="You have unread direct messages">
      <span id="newMsgText">New message</span>
    </a>
  </div>
  {% block body %}{% endblock %}
  <hr class="mt-4">
  <div class="text-muted small">TCP radio: <span class="mono">{{ host }}</span></div>
</div>
<script>
  (function () {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    function setLabel() {
      var t = document.documentElement.getAttribute('data-bs-theme') || 'light';
      btn.textContent = (t === 'dark') ? 'Light mode' : 'Dark mode';
    }
    setLabel();
    btn.addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-bs-theme') || 'light';
      var next = (cur === 'dark') ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', next);
      try { localStorage.setItem('mg-theme', next); } catch (e) {}
      setLabel();
    });
  })();
</script>
<script>
  // Poll the unread DM count and toggle the "New message" indicator.
  (function () {
    var badge = document.getElementById('newMsgBadge');
    var label = document.getElementById('newMsgText');
    if (!badge || !label) return;
    function refresh() {
      fetch('/api/unread_count', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : { unread: 0 }; })
        .then(function (j) {
          var n = (j && typeof j.unread === 'number') ? j.unread : 0;
          if (n > 0) {
            label.textContent = (n === 1) ? 'New message' : ('New messages (' + n + ')');
            badge.style.display = '';
          } else {
            badge.style.display = 'none';
          }
        })
        .catch(function () { /* keep prior state on transient error */ });
    }
    refresh();
    setInterval(refresh, 5000);
  })();
</script>
</body>
</html>
